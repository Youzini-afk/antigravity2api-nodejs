name: ${COMPOSE_PROJECT_NAME:-antigravity2api-new}

services:
  antigravity2api:
    build: .
    ports:
      - "${HOST_PORT:-8046}:8046"
    environment:
      - API_KEY=${API_KEY:-sk-text}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key-change-this-in-production}
      - PROXY=${PROXY:-}
      - SYSTEM_INSTRUCTION=${SYSTEM_INSTRUCTION:-}
      - IMAGE_BASE_URL=${IMAGE_BASE_URL:-}
    volumes:
      - ${DATA_DIR:-./data-new}:/app/data
      - ${IMAGES_DIR:-./public/images-new}:/app/public/images
      - ${ENV_FILE_PATH:-./.env.new}:/app/.env
      - ${CONFIG_FILE_PATH:-./config.new.json}:/app/config.json
    restart: unless-stopped
